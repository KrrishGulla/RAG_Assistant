<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Python Book Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f9f9f9;
        }
        h2 { color: #333; }
        .container {
            display: flex;
            flex-direction: row;
            gap: 40px;
        }
        .left-panel {
            flex: 1;
            max-width: 60%;
        }
        .right-panel {
            flex: 1;
            max-width: 40%;
            background-color: #fff;
            border: 2px dashed #ccc;
            height: 500px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        input[type="text"] {
            width: 80%;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
        }
        .answer {
            margin-top: 20px;
            padding: 15px;
            background-color: #e6f7ff;
            border-left: 5px solid #1890ff;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <h2>Python Book Assistant</h2>

    <!-- No more <form>, use JavaScript -->
    <input type="text" id="questionInput" placeholder="Type your question here" required>
    <button onclick="askQuestion()">Ask</button>

    <div class="container">
        <div class="left-panel">
            <div id="answerBox" class="answer" style="display: none;">
                <h3>Assistant:</h3>
                <p id="assistantAnswer"></p>
            </div>
        </div>

        <div class="right-panel">
            <iframe id="avatarIframe" src="http://localhost:5000/"></iframe>
        </div>
    </div>

    <script>
    function askQuestion() {
        const query = document.getElementById("questionInput").value.trim();
        if (!query) return;

        fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query })
        })
        .then(res => res.json())
        .then(data => {
            const answer = data.answer;
            document.getElementById("assistantAnswer").innerText = answer;
            document.getElementById("answerBox").style.display = 'block';

            // Send to avatar
            const avatarIframe = document.getElementById("avatarIframe");
            avatarIframe.contentWindow.postMessage({
                type: 'injectAndSpeak',
                payload: answer
            }, '*');
        })
        .catch(err => {
            console.error("Error:", err);
        });
    }
    </script>
</body>
</html>
